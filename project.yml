name: LunchRoulette
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: 1.0
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: 69YTT8J6WB
    PRODUCT_BUNDLE_IDENTIFIER: com.gnauh.LunchRoulette
    SWIFT_VERSION: 5.0
targets:
  LunchRoulette:
    type: application
    platform: iOS
    sources:
      - path: LunchRouletteApp
      - path: LunchRouletteApp/Features/Screenshots
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_CFBundleDisplayName: 午餐轉盤
        TARGETED_DEVICE_FAMILY: 1
    info:
      path: LunchRouletteApp/Resources/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchStoryboardName: LaunchScreen
